name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 讓 workflow 可以部署 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只跑一個部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build
        env:
          # GitHub Pages 子路徑，例如 /atc-edelrid-groupbuy/
          VITE_BASE: ${{ steps.pages.outputs.base_path }}
          # 後端 Google Apps Script URL（於 repo Settings → Secrets 設定後生效）
          VITE_APPS_SCRIPT_URL: ${{ secrets.VITE_APPS_SCRIPT_URL }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
